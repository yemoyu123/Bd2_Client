name: Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          TITLE="${{ github.event.release.name }}"
          if [ -z "$TITLE" ]; then TITLE="${{ github.event.release.tag_name }}"; fi
          
          CURRENT_TIME=$(date '+%Y/%m/%d %H:%M')
          AVATAR_URL="https://raw.githubusercontent.com/LycoRecoCoffee/LycoRecoCoffee/main/332dd72418f86c0f1c1cff9481ac0b66be3294a8.jpg"
          
          jq -n \
            --arg title "$TITLE" \
            --arg body "${{ github.event.release.body }}" \
            --arg url "${{ github.event.release.html_url }}" \
            --arg version "${{ github.event.release.tag_name }}" \
            --arg branch "${{ github.event.release.target_commitish }}" \
            --arg repo "${{ github.repository }}" \
            --arg time "$CURRENT_TIME" \
            --arg avatar "$AVATAR_URL" \
            '
            ($body | if length > 600 then .[0:597] + "..." else . end) as $clean_body |
            
            {
              username: "Chisato Release Bot",
              avatar_url: $avatar,
              embeds: [{
                title: ("🚀 " + $title),
                description: ("**Changelog / 更新日志**\n```md\n" + (if $clean_body == "" then "No content provided." else $clean_body end) + "\n```\n[✨ View on GitHub / 点击查看详情](" + $url + ")"),
                url: $url,
                color: 16746632,
                fields: [
                  { 
                    name: "📌 Version / 版本", 
                    value: ("`" + $version + "`"), 
                    inline: true 
                  },
                  { 
                    name: "🌿 Branch / 分支", 
                    value: ("`" + $branch + "`"), 
                    inline: true 
                  }
                ],
                footer: {
                  text: ("📁 " + $repo + "  •  ⏰ " + $time),
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                }
              }]
            }' > payload.json

          curl -f -s -S -H "Content-Type: application/json" \
            -X POST \
            -d @payload.json \
            "$DISCORD_WEBHOOK"
